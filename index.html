<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Personal portfolio of Benjamin Inglis — software engineer building thoughtful web applications."
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#16171d" media="(prefers-color-scheme: dark)" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Benjamin Inglis — Software Engineer</title>

    <!-- Apply the saved/OS theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('theme')
          var systemDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches
          var isDark = stored
            ? stored === 'dark' || (stored === 'system' && systemDark)
            : systemDark
          document.documentElement.classList.toggle('dark', isDark)
          document.documentElement.style.colorScheme = isDark
            ? 'dark'
            : 'light'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
